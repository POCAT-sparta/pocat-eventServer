name: Deploy Worker

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    concurrency:
      group: test-${{ github.ref }}
      cancel-in-progress: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'corretto'

      - name: Gradle 캐시
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: 실행 권한 부여
        run: chmod +x gradlew

      - name: 테스트 및 빌드
        run: ./gradlew build

      - name: jar artifact 업로드
        uses: actions/upload-artifact@v4
        with:
          name: worker-jar
          path: build/libs/*.jar
          retention-days: 1

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && needs.test.result == 'success'
    permissions:
      id-token: write
      contents: read
    concurrency:
      group: deploy-${{ github.ref }}
      cancel-in-progress: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: jar artifact 다운로드
        uses: actions/download-artifact@v4
        with:
          name: worker-jar
          path: build/libs

      - name: AWS 자격증명 설정
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::494966207118:role/pocat-worker-actions-role
          aws-region: ap-northeast-2

      - name: ECR 로그인
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Docker Buildx 설정
        uses: docker/setup-buildx-action@v3

      - name: ARM64 이미지 빌드 및 ECR 푸시
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/arm64
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/pocat-worker:latest
            ${{ steps.login-ecr.outputs.registry }}/pocat-worker:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: ECS 배포
        run: |
          aws ecs update-service \
            --cluster pocat-app-cluster \
            --service pocat-worker-service \
            --force-new-deployment

      - name: 배포 안정화 대기
        run: |
          aws ecs wait services-stable \
            --cluster pocat-app-cluster \
            --services pocat-worker-service